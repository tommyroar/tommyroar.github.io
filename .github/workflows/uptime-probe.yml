name: uptime-probe

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: uptime-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # Tailnet targets are skipped until the Tailscale step is enabled.
      # See https://github.com/tommyroar/tommyroar.github.io/issues — search
      # for "uptime probe: enable tailnet targets".
      - name: Probe targets
        run: npm run probe-uptime

      - name: Commit results
        run: |
          git config user.name  "uptime-bot"
          git config user.email "uptime-bot@users.noreply.github.com"
          git add data/uptime-current.json data/uptime-history.jsonl data/uptime-summary.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "uptime: $(date -u +%FT%TZ) [skip ci]"
            git push
          fi
