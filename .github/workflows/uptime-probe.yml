name: uptime-probe

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: uptime-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # Tailnet targets (grafana, influxdb, realitycapture-viewer, …) are probed
      # only when the runner joins the tailnet. That needs a Tailscale OAuth
      # client (tag:ci) exposed as repo secrets TS_OAUTH_CLIENT_ID /
      # TS_OAUTH_SECRET. If the secret is absent or the join fails, the join is
      # skipped and only public targets are probed — the workflow never fails
      # for lack of the secret, and tailnet targets are never falsely DOWN.
      - name: Detect tailnet credentials
        id: creds
        env:
          TS_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        run: echo "have=${TS_ID:+1}" >> "$GITHUB_OUTPUT"

      - name: Join tailnet
        id: ts
        if: steps.creds.outputs.have == '1'
        continue-on-error: true
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Probe targets
        # PROBE_TAILNET=1 only when the tailnet join actually succeeded.
        env:
          PROBE_TAILNET: ${{ steps.ts.outcome == 'success' && '1' || '0' }}
        run: npm run probe-uptime

      - name: Commit results
        run: |
          git config user.name  "uptime-bot"
          git config user.email "uptime-bot@users.noreply.github.com"
          git add data/uptime-current.json data/uptime-history.jsonl data/uptime-summary.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "uptime: $(date -u +%FT%TZ) [skip ci]"
            git push
          fi
